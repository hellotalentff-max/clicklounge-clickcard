<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClickCard CRM — Click Lounge Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap">
<style>
:root{--teal:#51897d;--dark:#2f4f4f;--gold:#d79068;--cream:#f5f0e8;--white:#fff;--light:#f4f7f6;--light2:#e8edee;--border:#dce3e1;--muted:#6b8c8c;--slate:#1e3333;--danger:#c0544a;--success:#3a7d5c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',Arial,sans-serif;background:var(--light);color:var(--slate);min-height:100vh;}
input,select,button,textarea{font-family:inherit;}
.topbar{background:var(--dark);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar h1{color:var(--cream);font-size:15px;font-weight:700;}
.topbar .sub{color:rgba(245,240,232,.35);font-size:10px;}
.topbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.badge{font-size:10px;color:var(--cream);opacity:.4;}
.container{max-width:1440px;margin:0 auto;padding:14px 18px;}
.btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;background:var(--white);cursor:pointer;}
.btn:hover{background:var(--light);}
.btn-t{background:var(--teal);color:var(--cream);border-color:var(--teal);}
.btn-g{background:var(--gold);color:#fff;border-color:var(--gold);}

/* Pipeline */
.pipeline{display:flex;gap:3px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.pipe-stage{flex:1;min-width:100px;text-align:center;padding:10px 8px;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);transition:all .15s;}
.pipe-stage:hover{box-shadow:0 2px 8px rgba(47,79,79,.08);}
.pipe-stage.active{border-color:var(--teal);box-shadow:0 0 0 2px rgba(81,137,125,.2);}
.pipe-count{font-size:20px;font-weight:800;}
.pipe-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}

/* Controls */
.ctrls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.search{flex:1;min-width:200px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--white);outline:none;}
.search:focus{border-color:var(--teal);}
.sel{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;background:var(--white);}
.cnt{font-size:11px;color:var(--muted);white-space:nowrap;}

/* Table */
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--white);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
thead th{padding:8px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);background:var(--light);text-align:left;border-bottom:1px solid var(--border);position:sticky;top:48px;z-index:10;}
tbody tr{cursor:pointer;transition:background .1s;}
tbody tr:hover{background:rgba(81,137,125,.03);}
tbody td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--light2);}
tbody tr:last-child td{border-bottom:none;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.nc{display:flex;align-items:center;gap:8px;}
.nm{font-weight:600;font-size:12px;}
.em{font-size:10px;color:var(--muted);}
.tb{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.rfm{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;font-family:monospace;}

/* Detail */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;}
.dp{position:fixed;right:0;top:0;bottom:0;width:520px;max-width:100%;background:var(--white);z-index:201;overflow-y:auto;box-shadow:-4px 0 24px rgba(47,79,79,.12);transform:translateX(100%);transition:transform .25s;}
.dp.open{transform:translateX(0);}
.dp-h{background:var(--dark);padding:18px 22px;color:var(--cream);position:relative;}
.dp-x{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:var(--cream);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:15px;}
.dp-b{padding:18px 22px;}
.card{background:var(--light);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.card-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;}
.card-v{font-size:13px;font-weight:600;}
.tl-item{padding:8px 0;border-bottom:1px solid var(--light2);font-size:12px;display:flex;gap:10px;}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.tl-body{flex:1;}

.loading{text-align:center;padding:40px;color:var(--muted);}
@media(max-width:768px){
  .pipeline{flex-wrap:wrap;}.pipe-stage{min-width:70px;}
  .ctrls{flex-direction:column;}.search{width:100%;}
  .dp{width:100%;}.hm{display:none;}
  thead th,tbody td{padding:6px 8px;font-size:11px;}
}
</style>
</head>
<body>
<div class="topbar">
  <div><h1>⭐ ClickCard CRM</h1><div class="sub">Click Lounge Studio</div></div>
  <div class="right">
    <span class="badge" id="ss"></span>
    <button class="btn" onclick="sync()" id="sb">🔄 Sync</button>
    <button class="btn btn-g" onclick="campaign()">✉ Campaign</button>
  </div>
</div>
<div class="container">
  <!-- Lifecycle Pipeline -->
  <div class="pipeline" id="pipeline"></div>
  <!-- Controls -->
  <div class="ctrls">
    <input class="search" id="q" placeholder="Search clients…" oninput="filter()">
    <select class="sel" id="sortBy" onchange="doSort()">
      <option value="rfm">Best Clients (RFM)</option>
      <option value="alpha">A → Z</option>
      <option value="spent">Most Spent</option>
      <option value="sessions">Most Sessions</option>
      <option value="recent">Newest First</option>
      <option value="recency">Most Recent Visit</option>
    </select>
    <span class="cnt" id="cnt">0</span>
  </div>
  <div id="tw"><div class="loading">Loading…</div></div>
  <div id="lm" style="display:none;text-align:center;padding:14px;"><button class="btn btn-t" onclick="more()">Load More</button> <span class="cnt" id="lmc"></span></div>
</div>
<!-- Detail -->
<div class="ov" id="ov" onclick="closeD()"></div>
<div class="dp" id="dp"><button class="dp-x" onclick="closeD()">✕</button><div id="dc"></div></div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbx_Y5nH34Rq16JJ2AxBDr30ttmDFuic61OqoC0u3Wq0zogHEhfoV6qE7uiNagI43flVgw/exec';

// ═══ LIFECYCLE STAGES ═══
const STAGES=[
  {id:'lead',   label:'New Lead',  color:'var(--muted)',  emoji:'🆕', desc:'Registered but no session yet'},
  {id:'booked', label:'Booked',    color:'#4a7fb5',       emoji:'📅', desc:'Has upcoming booking'},
  {id:'active', label:'Active',    color:'var(--teal)',    emoji:'🟢', desc:'Session within last 60 days'},
  {id:'loyal',  label:'Loyal',     color:'var(--gold)',    emoji:'⭐', desc:'3+ sessions'},
  {id:'vip',    label:'VIP',       color:'#b8860b',       emoji:'👑', desc:'5+ sessions or ₱10K+ spent'},
  {id:'atrisk', label:'At Risk',   color:'#d48806',       emoji:'⚠️', desc:'60-120 days since last visit'},
  {id:'dormant',label:'Dormant',   color:'var(--danger)',  emoji:'💤', desc:'120+ days since last visit'},
];

// ═══ STATE ═══
let ALL=[], FILT=[], SHOWN=0, PS=100, RAW={}, STAGE_FILTER='all';

// ═══ GAS ═══
async function gas(action,payload){
  const b=btoa(unescape(encodeURIComponent(JSON.stringify({action,payload:payload||{}}))));
  const u=GAS+'?d='+encodeURIComponent(b);
  try{const r=await fetch(u,{redirect:'follow'});const t=await r.text();
    if(t.startsWith('{')||t.startsWith('['))return JSON.parse(t);
    const m=t.match(/^[^(]+\((.+)\)\s*;?\s*$/s);if(m)return JSON.parse(m[1]);
    return{ok:false};
  }catch(e){
    return new Promise((res,rej)=>{
      const cb='_c'+Math.random().toString(36).slice(2);
      const tm=setTimeout(()=>{delete window[cb];rej(new Error('Timeout'))},20000);
      window[cb]=d=>{clearTimeout(tm);delete window[cb];res(d)};
      const s=document.createElement('script');
      s.src=u+'&callback='+cb;s.onerror=()=>{clearTimeout(tm);delete window[cb];rej(new Error('Network'))};
      document.body.appendChild(s);
    });
  }
}

// ═══ SYNC ═══
async function sync(){
  const b=document.getElementById('sb'),st=document.getElementById('ss');
  b.disabled=true;b.textContent='⏳';
  try{
    const d=await gas('getAll');if(!d.ok&&!d.clients)throw new Error(d.error||'Failed');
    RAW=d; process(d);
    st.textContent='✅ '+new Date().toLocaleTimeString('en-PH',{timeZone:'Asia/Manila'});
  }catch(e){st.textContent='❌ '+e.message;}
  b.disabled=false;b.textContent='🔄 Sync';
}

// ═══ PROCESS ═══
function process(d){
  const clients=d.clients||[],txns=(d.transactions||[]).filter(t=>!String(t.invoiceNum||'').startsWith('[VOID]')),regs=d.registrations||[],pa=d.pointsActivity||[],acks=d.acknowledgements||[];

  // Lookup maps (single pass each)
  const regC={},lastV={},txnS={},txnC={},hasSess={};
  regs.forEach(r=>{const n=(r.fbName||'').toLowerCase();regC[n]=(regC[n]||0)+1;if(!lastV[n]||r.date>lastV[n])lastV[n]=r.date;hasSess[n]=true;});
  txns.forEach(t=>{const n=(t.clientName||'').toLowerCase();txnS[n]=(txnS[n]||0)+(+t.total||0);txnC[n]=(txnC[n]||0)+1;hasSess[n]=true;});

  // Booking status from acks
  const hasBooking={};
  acks.forEach(a=>{const n=(a.fbName||'').toLowerCase();const st=String(a.status||'').toLowerCase();if(!st.includes('cancel')&&a.bookDate>=todayStr())hasBooking[n]=true;});

  const now=new Date(),today=todayStr();
  const d60=new Date(now);d60.setDate(d60.getDate()-60);const cut60=d60.toISOString().slice(0,10);
  const d120=new Date(now);d120.setDate(d120.getDate()-120);const cut120=d120.toISOString().slice(0,10);

  ALL=clients.map(c=>{
    const nL=(c.fbName||'').toLowerCase();
    const sessions=regC[nL]||0, spent=txnS[nL]||0, invoices=txnC[nL]||0;
    const lastVisit=lastV[nL]||'';
    const hasSe=hasSess[nL]||c.type==='booked'||c.type==='walkin';

    // Points
    const spend=Math.floor(spent/100);
    const bonus=(pa||[]).filter(a=>(a.fbName||'').toLowerCase()===nL).reduce((s,a)=>s+(parseInt(a.points)||0),0);
    const pts=(parseInt(c.points)>0)?parseInt(c.points):spend+bonus;

    // ── LIFECYCLE STAGE ──
    let stage='lead';
    if(!hasSe && hasBooking[nL])                          stage='booked';
    else if(hasSe && sessions>=5 || spent>=10000)         stage='vip';
    else if(hasSe && sessions>=3)                         stage='loyal';
    else if(hasSe && lastVisit>=cut60)                    stage='active';
    else if(hasSe && lastVisit>=cut120 && lastVisit<cut60)stage='atrisk';
    else if(hasSe && lastVisit<cut120)                    stage='dormant';
    else if(hasSe)                                        stage='active';

    // ── RFM SCORE (1-5 each, max 15) ──
    let R=1,F=1,M=1;
    if(lastVisit){
      const days=Math.floor((now-new Date(lastVisit+'T00:00:00'))/(86400000));
      if(days<=7)R=5;else if(days<=30)R=4;else if(days<=60)R=3;else if(days<=120)R=2;else R=1;
    }
    if(sessions>=10)F=5;else if(sessions>=5)F=4;else if(sessions>=3)F=3;else if(sessions>=2)F=2;else F=1;
    if(spent>=10000)M=5;else if(spent>=5000)M=4;else if(spent>=2000)M=3;else if(spent>=500)M=2;else M=1;
    const rfm=R+F+M;

    // Tier (for display badge)
    let tier='New';
    if(hasSe){tier='Bronze';if(pts>=200)tier='Silver';if(pts>=500)tier='Gold VIP';}

    const search=[c.fbName,c.email,c.phone,c.referredBy,tier,stage].filter(Boolean).join(' ').toLowerCase();

    return{
      fbName:c.fbName||'',email:c.email||'',phone:c.phone||'',birthday:c.birthday||'',
      type:c.type||'',added:c.added||'',socialConsent:c.socialConsent||'',
      referredBy:c.referredBy||'',notes:c.notes||'',staffNotes:c.staffNotes||'',
      _pts:pts,_tier:tier,_stage:stage,_sessions:sessions,_spent:spent,_invoices:invoices,
      _lastVisit:lastVisit,_rfm:rfm,_R:R,_F:F,_M:M,_search:search
    };
  });

  ALL.sort((a,b)=>b._rfm-a._rfm);
  renderPipeline();
  filter();
  document.getElementById('q').placeholder='Search '+ALL.length+' clients…';
}

// ═══ PIPELINE ═══
function renderPipeline(){
  const counts={};STAGES.forEach(s=>counts[s.id]=0);
  ALL.forEach(c=>counts[c._stage]=(counts[c._stage]||0)+1);
  document.getElementById('pipeline').innerHTML=
    '<div class="pipe-stage'+(STAGE_FILTER==='all'?' active':'')+'" onclick="setStage(\'all\')" style="border-color:var(--teal);">'+
      '<div class="pipe-count" style="color:var(--teal);">'+ALL.length+'</div><div class="pipe-label">All</div></div>'+
    STAGES.map(s=>
      '<div class="pipe-stage'+(STAGE_FILTER===s.id?' active':'')+'" onclick="setStage(\''+s.id+'\')" style="border-color:'+s.color+';" title="'+s.desc+'">'+
        '<div style="font-size:14px;">'+s.emoji+'</div>'+
        '<div class="pipe-count" style="color:'+s.color+';">'+(counts[s.id]||0)+'</div>'+
        '<div class="pipe-label">'+s.label+'</div>'+
      '</div>'
    ).join('');
}
function setStage(id){STAGE_FILTER=id;filter();renderPipeline();}

// ═══ FILTER ═══
function filter(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  FILT=ALL;
  if(STAGE_FILTER!=='all')FILT=FILT.filter(c=>c._stage===STAGE_FILTER);
  if(q)FILT=FILT.filter(c=>c._search.indexOf(q)!==-1);
  SHOWN=0;render();
}
function doSort(){
  const s=document.getElementById('sortBy').value;
  if(s==='rfm')ALL.sort((a,b)=>b._rfm-a._rfm);
  if(s==='alpha')ALL.sort((a,b)=>a.fbName.localeCompare(b.fbName));
  if(s==='spent')ALL.sort((a,b)=>b._spent-a._spent);
  if(s==='sessions')ALL.sort((a,b)=>b._sessions-a._sessions);
  if(s==='recent')ALL.sort((a,b)=>(b.added||'').localeCompare(a.added||''));
  if(s==='recency')ALL.sort((a,b)=>(b._lastVisit||'').localeCompare(a._lastVisit||''));
  filter();
}

// ═══ TABLE ═══
function render(){
  const w=document.getElementById('tw'),ct=document.getElementById('cnt');
  SHOWN=Math.min(PS,FILT.length);
  ct.textContent=FILT.length+' client'+(FILT.length!==1?'s':'');
  if(!FILT.length){w.innerHTML='<div class="loading">No clients match.</div>';document.getElementById('lm').style.display='none';return;}
  w.innerHTML='<table><thead><tr><th>Client</th><th>Stage</th><th>Tier</th><th class="hm">RFM</th><th class="hm">Sessions</th><th class="hm">Spent</th><th class="hm">Last Visit</th></tr></thead><tbody id="tb">'+FILT.slice(0,SHOWN).map(row).join('')+'</tbody></table>';
  updLM();
}
function row(c){
  const ini=c.fbName.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  const stg=STAGES.find(s=>s.id===c._stage)||STAGES[0];
  const tc=c._tier==='Gold VIP'?'#b8860b':c._tier==='Silver'?'#5b63d9':c._tier==='Bronze'?'#d79068':'var(--muted)';
  const rfmBg=c._rfm>=12?'rgba(58,125,92,.12)':c._rfm>=9?'rgba(81,137,125,.1)':c._rfm>=6?'rgba(215,144,104,.1)':'rgba(192,84,74,.08)';
  const rfmC=c._rfm>=12?'var(--success)':c._rfm>=9?'var(--teal)':c._rfm>=6?'var(--gold)':'var(--danger)';
  return '<tr onclick="openD(\''+encodeURIComponent(c.fbName)+'\')">'+
    '<td><div class="nc"><div class="av" style="background:'+stg.color+';">'+ini+'</div><div><div class="nm">'+esc(c.fbName)+'</div><div class="em">'+(c.email||'No email')+'</div></div></div></td>'+
    '<td><span class="tb" style="background:'+stg.color+'22;color:'+stg.color+';border:1px solid '+stg.color+'33;">'+stg.emoji+' '+stg.label+'</span></td>'+
    '<td><span class="tb" style="background:'+tc+'12;color:'+tc+';">'+c._tier+'</span></td>'+
    '<td class="hm"><span class="rfm" style="background:'+rfmBg+';color:'+rfmC+';" title="R'+c._R+' F'+c._F+' M'+c._M+'">'+c._rfm+'</span></td>'+
    '<td class="hm">'+c._sessions+'</td>'+
    '<td class="hm">'+(c._spent>0?'₱'+fmt(c._spent):'—')+'</td>'+
    '<td class="hm" style="font-size:10px;color:var(--muted);">'+(c._lastVisit||'—').slice(0,10)+'</td></tr>';
}
function more(){
  const next=FILT.slice(SHOWN,SHOWN+PS);
  document.getElementById('tb').insertAdjacentHTML('beforeend',next.map(row).join(''));
  SHOWN+=next.length;updLM();
}
function updLM(){
  const r=FILT.length-SHOWN,el=document.getElementById('lm');
  if(r>0){el.style.display='';document.getElementById('lmc').textContent=r+' more';}else el.style.display='none';
}

// ═══ DETAIL ═══
function openD(enc){
  const name=decodeURIComponent(enc),c=ALL.find(x=>x.fbName===name);if(!c)return;
  const stg=STAGES.find(s=>s.id===c._stage)||STAGES[0];
  const tc=c._tier==='Gold VIP'?'#b8860b':c._tier==='Silver'?'#5b63d9':c._tier==='Bronze'?'#d79068':'var(--muted)';
  const ini=c.fbName.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();

  // Build activity timeline from registrations + transactions
  const nL=c.fbName.toLowerCase();
  const timeline=[];
  (RAW.registrations||[]).forEach(r=>{if((r.fbName||'').toLowerCase()===nL)timeline.push({date:r.date||'',type:'visit',text:'📸 Studio visit'+(r.time?' at '+r.time:''),color:'var(--teal)'});});
  (RAW.transactions||[]).filter(t=>(t.clientName||'').toLowerCase()===nL&&!String(t.invoiceNum||'').startsWith('[VOID]')).forEach(t=>timeline.push({date:t.date||'',type:'invoice',text:'🧾 Invoice #'+t.invoiceNum+' — ₱'+fmt(+t.total||0),color:'var(--gold)'}));
  (RAW.acknowledgements||[]).filter(a=>(a.fbName||'').toLowerCase()===nL).forEach(a=>timeline.push({date:a.date||a.bookDate||'',type:'booking',text:'📅 Booking: '+(a.service||'Session')+' — '+(a.status||'Pending'),color:'#4a7fb5'}));
  (RAW.pointsActivity||[]).filter(a=>(a.fbName||'').toLowerCase()===nL).forEach(a=>timeline.push({date:a.date||'',type:'points',text:'🏅 '+(a.action||'Points')+': '+(parseInt(a.points)>0?'+':'')+a.points+' pts',color:'var(--success)'}));
  timeline.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const rfmBg=c._rfm>=12?'rgba(58,125,92,.12)':c._rfm>=9?'rgba(81,137,125,.1)':c._rfm>=6?'rgba(215,144,104,.1)':'rgba(192,84,74,.08)';
  const rfmC=c._rfm>=12?'var(--success)':c._rfm>=9?'var(--teal)':c._rfm>=6?'var(--gold)':'var(--danger)';

  document.getElementById('dc').innerHTML=
    '<div class="dp-h">'+
      '<div style="display:flex;align-items:center;gap:12px;">'+
        '<div class="av" style="background:'+stg.color+';width:44px;height:44px;font-size:15px;">'+ini+'</div>'+
        '<div><div style="font-size:17px;font-weight:700;">'+esc(c.fbName)+'</div>'+
          '<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">'+
            '<span class="tb" style="background:'+stg.color+'33;color:var(--cream);border:1px solid '+stg.color+'55;">'+stg.emoji+' '+stg.label+'</span>'+
            '<span class="tb" style="background:'+tc+'33;color:var(--cream);">'+c._tier+' · '+c._pts+' pts</span>'+
            '<span class="rfm" style="background:'+rfmBg+';color:'+rfmC+';">RFM '+c._rfm+'</span>'+
          '</div></div></div></div>'+
    '<div class="dp-b">'+
      // RFM breakdown
      '<div class="card"><div class="card-l">📊 Client Value Score (RFM)</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;">'+
          ['Recency|'+c._R+'|How recently they visited','Frequency|'+c._F+'|How often they come','Monetary|'+c._M+'|How much they spend'].map(s=>{
            const p=s.split('|');const pct=parseInt(p[1])*20;
            return '<div style="text-align:center;"><div style="font-size:10px;font-weight:700;color:var(--muted);">'+p[0]+'</div>'+
              '<div style="height:6px;background:var(--light2);border-radius:3px;margin:4px 0;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:'+rfmC+';border-radius:3px;"></div></div>'+
              '<div style="font-size:16px;font-weight:800;color:'+rfmC+';">'+p[1]+'</div>'+
              '<div style="font-size:9px;color:var(--muted);">'+p[2]+'</div></div>';
          }).join('')+
        '</div></div>'+
      // Stats
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">'+
        '<div class="card" style="text-align:center;"><div style="font-size:20px;font-weight:800;">'+c._sessions+'</div><div class="card-l">Visits</div></div>'+
        '<div class="card" style="text-align:center;"><div style="font-size:20px;font-weight:800;">'+c._invoices+'</div><div class="card-l">Invoices</div></div>'+
        '<div class="card" style="text-align:center;"><div style="font-size:14px;font-weight:800;">'+(c._spent>0?'₱'+fmt(c._spent):'₱0')+'</div><div class="card-l">Spent</div></div>'+
        '<div class="card" style="text-align:center;"><div style="font-size:20px;font-weight:800;">'+c._pts+'</div><div class="card-l">Points</div></div>'+
      '</div>'+
      // Contact
      '<div class="card"><div class="card-l">📇 Contact</div><div style="font-size:12px;line-height:2;">'+
        (c.email?'✉ '+esc(c.email)+'<br>':'<span style="color:var(--muted);">No email</span><br>')+
        (c.phone?'📱 '+esc(c.phone)+'<br>':'')+
        (c.birthday?'🎂 '+c.birthday+'<br>':'')+
        (c.referredBy?'👥 Referred by '+esc(c.referredBy)+'<br>':'')+
        '📅 Client since '+(c.added||'—')+'<br>'+
        '📸 SM Consent: '+(c.socialConsent==='yes'?'✅':'🚫')+
      '</div></div>'+
      // Timeline
      '<div class="card"><div class="card-l">📜 Activity Timeline ('+timeline.length+' events)</div>'+
        (timeline.length?'<div style="max-height:300px;overflow-y:auto;margin-top:6px;">'+
          timeline.slice(0,25).map(t=>
            '<div class="tl-item"><div class="tl-dot" style="background:'+t.color+';"></div>'+
              '<div class="tl-body"><div style="font-size:10px;color:var(--muted);">'+t.date.slice(0,10)+'</div>'+t.text+'</div></div>'
          ).join('')+
          (timeline.length>25?'<div style="font-size:10px;color:var(--muted);padding:6px 0;">+ '+(timeline.length-25)+' more events</div>':'')+
        '</div>':'<div style="font-size:12px;color:var(--muted);padding:8px 0;">No activity recorded yet</div>')+
      '</div>'+
      // Notes
      (c.notes||c.staffNotes?'<div class="card"><div class="card-l">📝 Notes</div><div style="font-size:12px;color:var(--muted);line-height:1.6;">'+(c.notes?esc(c.notes)+'<br>':'')+(c.staffNotes?'<b>Staff:</b> '+esc(c.staffNotes):'')+'</div></div>':'')+
      // Actions
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;">'+
        '<button class="btn btn-t" onclick="logPts(\''+enc+'\')">🏅 Log Points</button>'+
        '<button class="btn" onclick="redeem(\''+enc+'\')">🎁 Redeem</button>'+
        (c.email?'<a class="btn" href="mailto:'+c.email+'" style="text-decoration:none;">✉ Email</a>':'')+
      '</div></div>';

  document.getElementById('ov').style.display='block';
  setTimeout(()=>document.getElementById('dp').classList.add('open'),10);
}
function closeD(){document.getElementById('dp').classList.remove('open');setTimeout(()=>document.getElementById('ov').style.display='none',250);}

function logPts(enc){
  const name=decodeURIComponent(enc);const pts=prompt('Points to add for '+name+':');
  if(!pts||isNaN(pts))return;const reason=prompt('Reason:')||'Manual';
  gas('logPoints',{fbName:name,points:parseInt(pts),action:reason}).then(r=>{alert(r.ok?'✅ Added':'❌ '+(r.error||'Failed'));sync();});
}
function redeem(enc){
  const name=decodeURIComponent(enc);const pts=prompt('Points to redeem for '+name+':');
  if(!pts||isNaN(pts))return;const reward=prompt('Reward:')||'Redemption';
  gas('logPoints',{fbName:name,points:-Math.abs(parseInt(pts)),action:'Redeemed: '+reward}).then(r=>{alert(r.ok?'✅ Redeemed':'❌ '+(r.error||'Failed'));sync();});
}
function campaign(){
  const clients=FILT.filter(c=>c.email);if(!clients.length){alert('No clients with email in current view.');return;}
  const emails=clients.map(c=>c.email).join(',');
  window.open('https://mail.google.com/mail/u/0/?view=cm&fs=1&bcc='+encodeURIComponent(emails)+'&su='+encodeURIComponent('Special Offer from Click Lounge Studio!'),'_blank');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return Number(n||0).toLocaleString('en-PH',{maximumFractionDigits:0});}
function todayStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});}

sync();
</script>
